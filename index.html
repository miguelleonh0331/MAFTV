<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página de Prueba - MAFTV</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .status-badge {
            display: inline-block;
            background-color: #2ecc71;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        p {
            line-height: 1.6;
            color: #7f8c8d;
        }

        .project-name {
            font-weight: bold;
            color: #3498db;
        }

        /* Estilos del botón */
        .btn {
            display: inline-block;
            background-color: #3498db;
            color: white;
            padding: 12px 30px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.3);
        }

        .repo-link {
            margin-top: 30px;
            font-size: 0.9em;
            color: #95a5a6;
        }

        .repo-link a {
            color: #3498db;
            text-decoration: none;
        }

        .repo-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>¡Hola!</h1>
        <div class="status-badge">Prueba de GitHub Pages Exitosa</div>
        
        <p>Esta es una página de prueba sencilla creada para verificar tu despliegue.</p>
        
        <p>Este archivo forma parte del repositorio: <span class="project-name">MAFTV</span>.</p>

        <!-- Botón que quieres -->
        <a href="https://glow-disciplinary-deviation-tumor.trycloudflare.com/analytics2/rankings-custom.html" target="_blank" class="btn">
            Actualizar
        </a>

        <div class="repo-link">
            <p>Volver a <a href="https://github.com/miguelleonh0331/MAFTV" target="_blank">tu repositorio en GitHub</a></p>
        </div>
    </div>

</body>
</html>
